# wow-harness install manifest — machine-readable truth source
#
# Owner: WP-01b (skeleton, manifest_version) + WP-03 (registry fill).
# WP-11 adds one PreToolUse Read/Bash matcher entry to
# settings_command_registry (+1 physical_files). WP-SEC-1 CI consumes
# rebaseline_triggers + bash_read_keywords.
#
# Schema: ADR-043 §4 + §13.5

manifest_version: "0.1.0"
schema_owner: "PLAN-086 WP-01b (skeleton) + WP-03 (registry fill)"
notes: >
  WP-01b wrote skeleton with empty registries. WP-03 filled L1-L5 and
  settings_command_registry. WP-11 increments physical_files to 18 when
  install skill lands. All field semantics defined in ADR-043 §4 + §13.5.

# ---------------------------------------------------------------------------
# Five-layer registries — authoritative lists that L2 checks consume.
# (check_fragment_integrity / check_skill_parity / check_hook_installed)
# ---------------------------------------------------------------------------

L1_registry:
  - auto-python3.py
  - deploy-progress-on-session-end.py
  - failure-analyzer.py
  - find-project-root.sh
  - initializer-agent.py
  - loop-detection.py
  - precompact.sh
  - review-agent-gatekeeper.py
  - risk-tracker.py
  - sanitize-on-read.py
  - session-reflection.py
  - session-start-magic-docs.py
  - session-start-reset-risk.py
  - session-start-toolkit-reminder.py
  - stop-evaluator.md
  - stop-evaluator.py
  - tool-call-counter.py
  - trace-analyzer.py
  - guard-feedback.py
  - deploy-guard.py
  - context_router.py
  - guard_router.py

L2_registry:
  - check_api_types.py
  - check_artifact_link.py
  - check_bugfix_binding.py
  - check_bugfix_binding_ci.py
  - check_doc_file_references.py
  - check_doc_freshness.py
  - check_doc_links.py
  - check_file_existence_claims.py
  - check_fragment_integrity.py
  - check_hook_installed.py
  - check_issue_closure.py
  - check_security.py
  - check_skill_parity.py
  - check_versions.py
  - regenerate_magic_docs.py

L3_registry: []   # populated by WP-05 (.claude/rules/*.md)

L4_registry:
  - lead
  - crystal-learn
  - guardian-fixer

L5_registry:
  - ADR-030-guard-signal-protocol-and-governance-reload.md
  - ADR-038-harness-optimization-strategy.md
  - ADR-041-codex-claude-code-division-of-labor.md

# ---------------------------------------------------------------------------
# settings_command_registry — authoritative list of all hook commands
# declared in .claude/settings.json. Must match settings.json exactly.
# ---------------------------------------------------------------------------

settings_command_registry:
  - { stage: PostToolUse,        matcher: "Edit|Write", script: scripts/guard-feedback.py,                      timeout: 30 }
  - { stage: PostToolUse,        matcher: "Edit|Write", script: scripts/hooks/loop-detection.py,                timeout: 5  }
  - { stage: PostToolUse,        matcher: "Edit|Write", script: scripts/hooks/risk-tracker.py,                  timeout: 3  }
  - { stage: PreToolUse,         matcher: "Bash",       script: scripts/deploy-guard.py,                        timeout: 10 }
  - { stage: PreToolUse,         matcher: "Bash",       script: scripts/hooks/auto-python3.py,                  timeout: 5,  if: "Bash(python *)" }
  - { stage: PreToolUse,         matcher: "*",          script: scripts/hooks/tool-call-counter.py,             timeout: 3 }
  - { stage: PreToolUse,         matcher: "Task",       script: scripts/hooks/review-agent-gatekeeper.py,       timeout: 5 }
  - { stage: PreToolUse,         matcher: "Read|Bash",  script: scripts/hooks/sanitize-on-read.py,             timeout: 10 }
  - { stage: PreCompact,         matcher: "*",          script: scripts/hooks/precompact.sh,                    timeout: 5 }
  - { stage: SessionStart,       matcher: "*",          script: scripts/hooks/session-start-reset-risk.py,      timeout: 3 }
  - { stage: SessionStart,       matcher: "*",          script: scripts/hooks/session-start-magic-docs.py,      timeout: 10 }
  - { stage: SessionStart,       matcher: "*",          script: scripts/hooks/session-start-toolkit-reminder.py, timeout: 5 }
  - { stage: Stop,               matcher: "*",          script: scripts/hooks/stop-evaluator.py,                timeout: 10 }
  - { stage: SessionEnd,         matcher: "*",          script: scripts/hooks/session-reflection.py,            timeout: 10 }
  - { stage: SessionEnd,         matcher: "*",          script: scripts/hooks/trace-analyzer.py,                timeout: 30, args: "analyze --days 1 --min-samples 3" }
  - { stage: SessionEnd,         matcher: "*",          script: scripts/hooks/deploy-progress-on-session-end.py, timeout: 5 }
  - { stage: PostToolUseFailure, matcher: "*",          script: scripts/hooks/failure-analyzer.py,              timeout: 5 }

# ---------------------------------------------------------------------------
# rebaseline_triggers — WP-SEC-1 detect_rebaseline_triggers.py consumption.
# If a PR touches any of these, CI forces a plan-level rebaseline step.
# ---------------------------------------------------------------------------

rebaseline_triggers:
  - .wow-harness/MANIFEST.yaml
  - .wow-harness/issue-adapter.yaml
  - .wow-harness/deploy-allowlist.yaml
  - .claude/settings.json
  - scripts/lib/claim_patterns.py
  - scripts/sanitize.py

# ---------------------------------------------------------------------------
# physical_files — WP-SEC-1 CI double-commit count assertion.
#   WP-03 commit: 17 (15 hooks + 2 root scripts)
#   WP-11 commit: 18 (+ install-wow-harness SKILL.md)
#   post-audit: 22 (+ risk-tracker, session-start-reset-risk, sanitize-on-read,
#                     context_router, guard_router)
# ---------------------------------------------------------------------------

physical_files: 22

# ---------------------------------------------------------------------------
# bash_read_keywords — Bash matcher read-only classification.
# Consumed by WP-11 sanitize-on-read.py and WP-SEC-1 test 12 (double-diff).
# ---------------------------------------------------------------------------

bash_read_keywords:
  - cat
  - head
  - tail
  - less
  - "git log"
  - "git show"
  - rg
  - grep
  - jq
  - cut
  - awk
  - sed
